name: CI

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Check JavaScript syntax
        run: |
          node -c server.js
          node -c public/js/main.js
          node -c public/js/theme.js
          node -c public/js/version.js

      - name: Run unit tests with coverage
        run: npm run coverage

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Run visual regression tests
        run: npm run test:visual

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Start integration stack
        run: |
          npm run integration:down || true
          DOCKER_SOCK_GID="$(stat -c '%g' /var/run/docker.sock)" npm run integration:up

      - name: Check integration Docker socket
        run: |
          stat -c 'host socket %a %u:%g %n' /var/run/docker.sock
          sudo docker exec integration-agent ls -l /var/run/docker.sock
          sudo docker exec integration-agent sh -lc 'id; if command -v curl >/dev/null 2>&1; then curl --silent --show-error --unix-socket /var/run/docker.sock http://localhost/version; echo; curl --silent --show-error --unix-socket /var/run/docker.sock "http://localhost/containers/json?all=1"; echo; else node -e "const http=require(\"http\"); for (const path of [\"/version\", \"/containers/json?all=1\"]) http.request({socketPath:\"/var/run/docker.sock\",path},res=>{let body=\"\";res.on(\"data\",chunk=>body+=chunk);res.on(\"end\",()=>console.log(path, res.statusCode, body));}).on(\"error\",err=>{console.error(path, err.message);process.exitCode=1;}).end();"; fi'

      - name: Run Playwright integration tests
        env:
          INTEGRATION_CLOUDFLARE_ZONE: ${{ secrets.INTEGRATION_CLOUDFLARE_ZONE }}
          INTEGRATION_CLOUDFLARE_ZONE_ID: ${{ secrets.INTEGRATION_CLOUDFLARE_ZONE_ID }}
          INTEGRATION_CLOUDFLARE_API_TOKEN: ${{ secrets.INTEGRATION_CLOUDFLARE_API_TOKEN }}
        run: npm run test:integration

      - name: Show integration logs
        if: failure()
        run: |
          sudo docker compose -f tests/integration/docker-compose.yml ps
          sudo docker ps -a
          sudo docker images
          curl -s http://127.0.0.1:3000/logs || true
          curl -s 'http://127.0.0.1:8001/api/plugins/docker/hosts/?limit=1000' || true
          curl -s 'http://127.0.0.1:8001/api/plugins/docker/containers/?limit=1000' || true
          curl -s 'http://127.0.0.1:8001/api/plugins/docker/images/?limit=1000' || true
          sudo docker compose -f tests/integration/docker-compose.yml logs --tail=200

      - name: Cleanup
        if: always()
        run: npm run integration:down
