services:
  agent:
    image: saashup/netbox-docker-agent:v1.24.1
    container_name: integration-agent
    environment:
      ENABLE_EDITOR: 1
      NETBOX_URL: http://integration-paasbox:8000
    group_add:
      - "${DOCKER_SOCK_GID:-0}"
    ports:
      - "${INTEGRATION_AGENT_PORT:-1881}:1880"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
    restart: unless-stopped

  paasbox:
    image: saashup/paasbox:v1.0.4
    container_name: integration-paasbox
    environment:
      PB_MIGRATE: 1
      PB_AUTH_REQUIRED: 0
    ports:
      - "${INTEGRATION_PAASBOX_PORT:-8001}:8000"
    depends_on:
      - agent

  app:
    build:
      context: ../..
    image: netbox-docker-image-upgrade:integration
    container_name: integration-app
    environment:
      APP_OWNER_EMAIL: contact@saashup.com
      OPERATION_TIMEOUT_SECONDS: 120
      OPERATION_POLL_MS: 3000
      CREATE_CONFIGURE_DELAY_MS: 3000
      CREATE_RECREATE_DELAY_MS: 5000
      ENROLL_CREATE_RECREATE_DELAY_MS: 2000
      REGISTRY_WEBHOOK_SECRET: secret
      ENABLE_EDITOR: 1
      ADMIN_ALLOWED_EMAILS: admin@local.test
      LOCAL_DEV_EMAIL: admin@local.test
      OIDC_ENABLED: false
      PUBLIC_IMAGE: true
    ports:
      - "${INTEGRATION_APP_PORT:-3000}:1880"
    depends_on:
      - paasbox
    volumes:
      - integration-app-data:/data

volumes:
  integration-app-data:
