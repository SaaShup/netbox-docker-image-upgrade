<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access denied</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #152033;
      background:
        radial-gradient(circle at top left, rgba(36, 107, 254, 0.12), transparent 32rem),
        #f4f7fb;
    }

    main {
      width: min(100%, 460px);
      padding: 30px;
      border: 1px solid #d9e2ef;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 45px rgba(21, 32, 51, 0.10);
    }

    .status {
      margin: 0 0 10px;
      color: #246bfe;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.15;
    }

    p {
      margin: 12px 0 0;
      color: #667085;
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 22px;
      padding: 0 16px;
      border-radius: 12px;
      color: white;
      background: #246bfe;
      font-weight: 800;
      text-decoration: none;
    }

    a:hover {
      background: #1d55c9;
    }
  </style>
</head>
<body>
  <main>
    <p class="status">403 forbidden</p>
    <h1>Access denied</h1>
    <p>Your account is signed in, but it is not allowed to open the admin console.</p>
    <p>Ask an administrator to add your email to ADMIN_ALLOWED_EMAILS.</p>
    <a href="/">Go to home page</a>
  </main>
</body>
</html>
