<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saashup Catalog</title>
  <link rel="icon" href="saashup_logo.svg">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="catalog-page">
  <main class="main catalog-main">
    <header class="site-header">
      <div class="site-header-left">
        <a href="https://saashup.com" class="brand-badge" target="_blank" rel="noreferrer noopener">
          <img src="saashup_logo.svg" alt="SaaShup logo" aria-hidden="true">
          <span>SaaShup</span>
        </a>
        <button type="button" class="theme-toggle order-theme" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">☾</button>
      </div>
      <nav class="nav" aria-label="Home actions">
        <a href="/order" class="nav-cta">Order</a>
        <a href="/admin" class="nav-cta">Open admin</a>
      </nav>
    </header>
    <nav class="order-page-menu" aria-label="Account pages">
      <a href="/order">My instances</a>
      <a href="/enroll">My images</a>
      <a href="/catalog" aria-current="page">Catalog</a>
      <a href="/admin" id="adminLink" class="hidden">Admin</a>
    </nav>
    <div class="auth-user order-auth hidden" id="authUser">
      <div class="auth-avatar" id="authAvatar" aria-hidden="true">?</div>
      <div class="auth-copy">
        <span id="authName">Signed in</span>
        <small id="authEmail"></small>
      </div>
      <button type="button" class="btn btn-secondary auth-logout" id="logoutBtn">Logout</button>
    </div>

    <section class="catalog-panel" aria-label="Catalog">
      <p class="catalog-eyebrow">Template catalog</p>
      <div class="catalog-controls">
        <input type="search" id="catalogSearch" class="catalog-search" placeholder="Search catalog" aria-label="Search catalog">
        <select id="catalogSort" class="catalog-sort" aria-label="Sort catalog">
          <option value="name">Name A-Z</option>
          <option value="image">Image A-Z</option>
          <option value="status">Status</option>
          <option value="usage">Most used</option>
        </select>
      </div>
      <div class="catalog-list" id="catalogList" aria-live="polite">
        <div class="catalog-empty">Loading catalog...</div>
      </div>
    </section>

    <footer class="app-footer order-footer">
      <span>SaaShup © 2026</span>
      <span data-app-version></span>
    </footer>
  </main>

  <script src="js/main.js"></script>
  <script src="js/version.js"></script>
</body>
</html>
