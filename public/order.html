<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Saashup Instance</title>
  <link rel="icon" href="saashup_logo.svg">
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="order-page">
  <main class="main">
    <nav class="order-page-menu" aria-label="Account pages">
      <a href="/order" aria-label="My instances" title="My instances" aria-current="page"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6h14"></path><path d="M5 12h14"></path><path d="M5 18h14"></path><path d="M8 6v.01"></path><path d="M8 12v.01"></path><path d="M8 18v.01"></path></svg></a>
      <a href="/enroll" class="hidden" aria-label="My images" title="My images"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"></rect><circle cx="9" cy="10" r="1.5"></circle><path d="M20 15l-4-4-7 8"></path></svg></a>
      <a href="/catalog" aria-label="Catalog" title="Catalog"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="6" height="6" rx="1"></rect><rect x="14" y="4" width="6" height="6" rx="1"></rect><rect x="4" y="14" width="6" height="6" rx="1"></rect><rect x="14" y="14" width="6" height="6" rx="1"></rect></svg></a>
      <a href="/admin" id="adminLink" class="hidden" aria-label="Admin" title="Admin"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"></path><path d="M3 12h3"></path><path d="M18 12h3"></path><path d="M12 3v3"></path><path d="M12 18v3"></path><path d="M5.6 5.6l2.1 2.1"></path><path d="M16.3 16.3l2.1 2.1"></path><path d="M18.4 5.6l-2.1 2.1"></path><path d="M7.7 16.3l-2.1 2.1"></path></svg></a>
    </nav>
    <div class="top-left-bar">
      <a href="https://saashup.com" class="brand-badge" target="_blank" rel="noreferrer noopener">
        <img src="saashup_logo.svg" alt="SaaShup logo" aria-hidden="true">
        <span>SaaShup</span>
      </a>
      <div class="auth-user order-auth hidden" id="authUser">
        <div class="auth-avatar" id="authAvatar" aria-hidden="true">?</div>
        <div class="auth-copy">
          <span id="authName">Signed in</span>
          <small id="authEmail"></small>
        </div>
        <button type="button" class="btn btn-secondary auth-logout" id="logoutBtn" aria-label="Logout" title="Logout">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"></path><path d="M7.05 6.35a8 8 0 1 0 9.9 0"></path></svg>
        </button>
      </div>
      <button type="button" class="theme-toggle order-theme" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">☾</button>
    </div>

    <form id="instanceForm" action="/create" method="post">
      <div hidden>
        <label data-field="config_profile">
          <select id="config_profile" name="config_profile"></select>
        </label>

        <label data-field="network">
          <input type="text" id="network" name="network">
        </label>

        <label data-field="instance">
          <input type="text" id="instance" name="instance" list="instanceOptions">
          <button type="button" id="refreshInstancesBtn">Refresh instances</button>
          <datalist id="instanceOptions"></datalist>
        </label>

        <label data-field="image">
          <input type="text" id="image" name="image" list="imageOptions">
          <button type="button" id="refreshImagesBtn">Refresh images</button>
          <datalist id="imageOptions"></datalist>
        </label>

        <label data-field="version">
          <input type="text" id="version" name="version">
        </label>

        <div data-field="env_vars">
          <div id="envList">
            <div class="env-row">
              <input type="text" id="var_env_key" name="var_env_key">
              <input type="text" id="var_env_value" name="var_env_value">
              <button type="button" class="env-remove" disabled>Remove</button>
            </div>
          </div>
        </div>

        <div data-field="labels">
          <div id="labelList">
            <div class="repeat-row">
              <input type="text" id="label_key" name="label_key">
              <input type="text" id="label_value" name="label_value">
              <button type="button" class="repeat-remove" disabled>Remove</button>
            </div>
          </div>
        </div>

        <div data-field="ports">
          <div id="portList">
            <div class="repeat-row">
              <input type="number" id="port_value" name="port_value" min="1" max="65535" required>
              <button type="button" class="repeat-remove" disabled>Remove</button>
            </div>
          </div>
        </div>

        <div data-field="volumes">
          <div id="volumeList">
            <div class="repeat-row">
              <input type="text" id="volume_source" name="volume_source">
              <input type="text" id="volume_name" name="volume_name" readonly>
              <button type="button" class="repeat-remove" disabled>Remove</button>
            </div>
          </div>
        </div>

        <input type="text" id="config_name" name="config_name">
        <input type="url" id="netbox" name="netbox">
        <input type="password" id="token" name="token" autocomplete="off">
        <input type="url" id="proxy" name="proxy">
        <input type="text" id="domain" name="domain">
        <input type="text" id="tag" name="tag">
        <input type="number" id="max_instances" name="max_instances" min="0" max="100" value="1">
        <input type="text" id="oldversion" name="oldversion" list="oldVersionOptions">
        <datalist id="oldVersionOptions"></datalist>
        <input type="text" id="restart_version" name="restart_version" list="restartVersionOptions">
        <datalist id="restartVersionOptions"></datalist>
        <input type="checkbox" id="clean_name" name="clean_name" value="true">
        <input type="checkbox" id="saashup_enabled" name="saashup_enabled" value="true" checked>
        <select id="templateSelect" aria-label="Create template"></select>
      </div>

      <section class="order-instances hidden" id="orderInstances" aria-live="polite"></section>

      <p class="order-status hidden" id="orderStatus" role="status"></p>

      <div class="order-loading" id="orderLoading" role="status">
        <span class="order-spinner" aria-hidden="true"></span>
        <span class="order-loading-text">Loading instances</span>
      </div>

      <div class="form-actions hidden" id="orderActions">
        <p class="order-question">Do you  want to install an instance?</p>
        <button type="submit" class="btn btn-primary" id="submitBtn">Yes</button>
        <button type="button" class="btn btn-secondary" id="orderCancelBtn">No</button>
      </div>
    </form>
    <footer class="app-footer order-footer">
      <span>SaaShup © 2026</span>
      <span data-app-version></span>
    </footer>
  </main>

  <script src="js/main.js"></script>
  <script src="js/version.js"></script>
</body>
</html>
